<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KeywordHunter - Giriş</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl w-full max-w-md">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-white mb-2">🕵️ KeywordHunter</h1>
            <p class="text-gray-400">Dark Web CTI Aracı</p>
        </div>
        
        {{if .error}}
        <div class="bg-red-500/20 border border-red-500 text-red-400 px-4 py-3 rounded mb-4">
            ❌ Kullanıcı adı veya şifre hatalı
        </div>
        {{end}}
        
        <form method="POST" action="/login" class="space-y-6">
            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Kullanıcı Adı</label>
                <input type="text" name="username" required autofocus
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            
            <div>
                <label class="block text-gray-300 text-sm font-medium mb-2">Şifre</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-3 bg-gray-700 border border-gray-600 rounded-lg text-white focus:outline-none focus:border-blue-500 transition">
            </div>
            
            <button type="submit" 
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-medium py-3 px-4 rounded-lg transition duration-200">
                Giriş Yap
            </button>
        </form>
        
        <p class="text-center text-gray-500 text-sm mt-6">
            Robin-based Dark Web Search Tool
        </p>
    </div>
</body>
</html>
