services:
  tor:
    image: osminogin/tor-simple
    container_name: keywordhunter-tor
    ports:
      - "9051:9050"
    restart: unless-stopped

  app:
    build: .
    container_name: keywordhunter-app
    ports:
      - "8080:8080"
    environment:
      - ENV_FILE=/data/.env
    volumes:
      - ./data:/data
    depends_on:
      - tor
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:8080/login || exit 1"]
      interval: 25s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped
